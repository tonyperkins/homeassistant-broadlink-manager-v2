name: Broadlink Manager v2 (Beta)
version: "0.5.0-beta.15"
slug: broadlink-manager-v2
description: Next-generation Broadlink device manager with Vue 3 interface (Beta)
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: manual
init: false
auth_api: true
ingress: true
panel_icon: mdi:remote
ports:
  8099/tcp: null
options:
  log_level: info
  web_port: 8099
  ha_url: "http://supervisor/core"
  # IMPORTANT: Keep ha_token empty for security
  # Users will set this in the add-on configuration UI
  ha_token: ""
  force_legacy_learning: false
  auto_discover: true
  package_output_path: ""
schema:
  log_level: list(trace|debug|info|warning|error|fatal)?
  web_port: int?
  auto_discover: bool?
  force_legacy_learning: bool?
  package_output_path: str?
homeassistant_api: true
hassio_api: true
hassio_role: default
host_network: true
apparmor: false
image: ghcr.io/tonyperkins/homeassistant-broadlink-manager-v2
map:
  - config:rw
